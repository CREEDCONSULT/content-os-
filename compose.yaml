name: mezie-brandos

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mezie_brandos}
      POSTGRES_USER: ${POSTGRES_USER:-brandos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brandos_local_only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brandos} -d ${POSTGRES_DB:-mezie_brandos}"]
      interval: 5s
      timeout: 4s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: >-
        postgresql+psycopg://${POSTGRES_USER:-brandos}:${POSTGRES_PASSWORD:-brandos_local_only}@postgres:5432/${POSTGRES_DB:-mezie_brandos}
      SOURCE_DOCUMENTS_PATH: /app/source-documents
      OBJECT_STORAGE_PATH: /app/storage
      BRANDOS_VAULT_PATH: /app/vault
    volumes:
      - object-storage:/app/storage
      - brandos-vault:/app/vault
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NODE_ENV: production
    ports:
      - "${BRANDOS_WEB_PORT:-3100}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres-data:
  object-storage:
  brandos-vault:
